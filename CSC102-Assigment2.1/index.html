<!-- This turns the document type as HTML5 -->
<!DOCTYPE html>

<!-- This is the opening tag for the HTML document -->
<html>

<!-- This is the opening tag for the head section -->
<head>

    <!-- This is the opening tag for the page title -->
    <title>
        <!-- This is the text that appears in the browser tab -->
        System Status Report
    <!-- This is the closing tag for the page title -->
    </title>

    <!-- This style block creates the Gold and Black look and feel -->
    <style>
        /* This styles the main body background and layout */
        body {
            background-color: #000000; /* Pure black background */
            color: #FFD700; /* Gold text color */
            font-family: 'Courier New', monospace; /* Monospace font */
            text-align: center; /* Centers text */
            display: flex; /* Uses flexbox for alignment */
            flex-direction: column; /* Stacks items vertically */
            align-items: center; /* Centers items horizontally */
            justify-content: center; /* Centers items vertically */
            height: 100vh; /* Takes up full screen height */
            margin: 0; /* Removes default margins */
        }
        
        /* This styles the H1 header */
        h1 {
            border-bottom: 3px solid #FFD700; /* Gold underline */
            padding-bottom: 10px; /* Space between text and line */
            font-size: 2.5em; /* Makes text larger */
        }

        /* This styles the gif */
        img {
            border: 3px solid #FFD700; /* Gold border around it */
            border-radius: 8px; /* Rounded corners to make it look nice */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); /* Gold glow effect */
            width: 600px; /* The width of the gif */
            height: auto; /* Maintains aspect ratio of the gif */
        }
    </style>

<!-- This is the closing tag for the head section -->
</head>

<!-- This is the opening tag for the body section -->
<body>

    <!-- This is the opening tag for the main header -->
    <h1>
        <!-- This is the header text above the gif -->
        THIS IS PERFECTLY FINE
    <!-- This is the closing tag for the main header -->
    </h1>

    <!-- This is the opening tag for the paragraph container -->
    <p>
        <!-- This puts the meme GIF with the specific ID -->
        <img id="memeGIF" src="this-is-fine-its-fine.gif" alt="This is fine dog">
    
    <!-- This is the closing tag for the paragraph -->
    </p>

<!-- This is the closing tag for the body section -->
</body>

<!-- This is the closing tag for the HTML document -->
</html>
