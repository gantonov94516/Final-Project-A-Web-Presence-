<!-- This tells the browser we are using HTML5 -->
<!DOCTYPE html>

<!-- This opens the HTML document -->
<html lang="en">

<!-- This is the head section where page settings live -->
<head>

    <!-- This sets the character encoding -->
    <meta charset="UTF-8">

    <!-- This makes the page scale properly on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- This is the browser tab title -->
    <title>GPU Comparison Table - April 2026</title>

    <!-- This links the external CSS file for styling -->
    <link rel="stylesheet" href="table.css">

<!-- This closes the head section -->
</head>

<!-- This opens the body where visible content lives -->
<body>

    <!-- This is the main page wrapper -->
    <div id="pageWrapper">

        <!-- This is the page heading -->
        <h1>GPU Price Tracker — April 2026</h1>

        <!-- This is a subtitle explaining the table -->
        <p id="subtitle">Real market prices vs. MSRP as of April 2026. Built dynamically with JavaScript. Prices sourced from Amazon, Best Buy, and Tom's Hardware.</p>

        <!-- This empty div is where JavaScript will inject the table -->
        <div id="tableContainer"></div>

        <!-- This shows the color key legend for the price diff column -->
        <div id="legend">
            <span class="pill above">Above MSRP</span>
            <span class="pill below">Below MSRP</span>
            <span class="pill atmrsp">At MSRP</span>
        </div>

        <!-- This shows how many rows were generated -->
        <p id="rowCount"></p>

    <!-- This closes the page wrapper -->
    </div>

    <!-- This links the external JavaScript file -->
    <script src="table.js"></script>

<!-- This closes the body -->
</body>

<!-- This closes the HTML document -->
</html>
